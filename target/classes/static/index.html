<!DOCTYPE html>
<html>
<head>
    <title>Agenda Telefonica</title>
</head>
<body>
<h2>Adauga Persoana </h2>
<div class="form-group">
    <input type="text" id="firstName" placeholder="Prenume">
    <input type="text" id="lastName" placeholder="Nume">
    <input type="text" id="phone" placeholder="Telefon">
    <button onclick="savePerson()">Salveaza</button>
</div>

<hr>

<h2>Cautare Agenda</h2>
<button onclick="fetchAgenda()">Afiseaza tot / Refresh</button>
<table id="agendaTable">
    <thead>
    <tr>
        <th>ID</th><th>Prenume</th><th>Nume</th><th>Telefon</th>
        <th>Sterge persoana</th> <th>Modifica persoana</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
        // Operatia POST
        async function savePerson() {
            const data = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                telephoneNumber: document.getElementById('phone').value
            };

            const response = await fetch('/person', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.status === 201) {
                alert("Persoana adaugata");
                fetchAgenda();
            }
        }

        // Operatia GET
        async function fetchAgenda() {
            const response = await fetch('/agenda');
            if (response.status === 200) {
                const persons = await response.json();
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                persons.forEach(p => {
                    tbody.innerHTML += `<tr>
                        <td>${p.id}</td>
                        <td>${p.firstName}</td>
                        <td>${p.lastName}</td>
                        <td>${p.telephoneNumber}</td>
                        <td> <button onclick = "deletePerson(${p.id})">Sterge</button></td>
                        <td> <button onclick = "updatePerson(${p.id})">Modifica</button></td>
                    </tr>`;
                });
            } else if (response.status === 204) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4">Agenda este goala.</td></tr>';
            }
        }

        //Operatia DELETE
        async function deletePerson(id){
            const response = await fetch(`/person/${id}`, {method: 'DELETE'});

            if(response.status === 200){
                alert("Persoana stearsa cu succes");
                fetchAgenda();
            }else if (response.status === 404){
                alert("Persoana nu a fost gasita");
            }
        }

        //Operatia PUT
        async function updatePerson(id){
            const dateNoi = {
                id: id,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                telephoneNumber: document.getElementById('phone').value
            };
            const response = await fetch(`person/${id}`,{
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dateNoi)
                });

            if(response.status === 202){
                alert("Persoana actualizata");
                fetchAgenda();
            }
            else if (response.status === 404){
                    alert("Persoana nu a fost gasita");
            }
        }

        // Incarcare initiala
        window.onload = fetchAgenda;
    </script>
</body>
</html>
